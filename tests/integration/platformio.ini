; pio-test-runner on-device integration tests
;
; Exercises all runner features on real hardware:
;   - READY/RUN/DONE protocol handshake
;   - Memory leak tracking ([MEM] markers)
;   - Per-test timing (>>> TEST START markers)
;   - Deep sleep orchestration (SLEEP sentinel + actual sleep/wake)
;   - Disconnect protocol (PTR:DISCONNECT/RECONNECT)
;
; Usage:
;   pio test -e esp32s3                         # run all tests
;   pio test -e esp32s3 -- -ts="*Protocol*"     # run one suite
;
; To add a new board:
;   1. Create boards/<board>.ini with [board:<name>] section
;   2. Add [env:<name>] extending board:<name> below

[platformio]
extra_configs = boards/*.ini

[common:doctest]
build_flags =
    -DDOCTEST_CONFIG_SUPER_FAST_ASSERTS
    -DDOCTEST_CONFIG_NO_POSIX_SIGNALS
    -DDOCTEST_THREAD_LOCAL=
lib_deps =
    doctest/doctest@^2.4.11
    pio-test-runner=symlink://../../

[env:esp32s3]
extends = board:esp32s3
test_framework = custom
test_build_src = yes
build_flags =
    ${board:esp32s3.build_flags}
    ${common:doctest.build_flags}
lib_deps =
    ${common:doctest.lib_deps}
lib_ldf_mode = chain
; pio_test_init.py sets up Python sys.path for the pio-test-runner and
; embedded-bridge imports. For symlink deps, reference the script via
; the resolved library path (not .pio/libdeps which uses .pio-link files).
extra_scripts =
    pre:../../scripts/pio_test_init.py
