name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ --ignore=tests/integration -v

  native-cpp-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch doctest header
        run: |
          mkdir -p tests/doctest
          curl -sL https://raw.githubusercontent.com/doctest/doctest/v2.4.11/doctest/doctest.h \
            -o tests/doctest/doctest.h

      - name: Build and run native C++ tests
        run: |
          cd tests
          g++ -std=c++17 -Idoctest test_doctest_internals.cpp -o test_doctest_internals
          ./test_doctest_internals -s
